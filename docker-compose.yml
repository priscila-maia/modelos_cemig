services:
  qwen-flow:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    env_file:
      - .env
    environment:
      HF_HOME: /workspace/.cache/huggingface
      TRANSFORMERS_CACHE: /workspace/.cache/huggingface/transformers
      SENTENCE_TRANSFORMERS_HOME: /workspace/.cache/huggingface/sentence_transformers
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0" ]
              capabilities: [ gpu ]
    stdin_open: true
    tty: true
